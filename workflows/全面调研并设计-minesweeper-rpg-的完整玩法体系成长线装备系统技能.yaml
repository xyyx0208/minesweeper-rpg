name: "扫雷RPG玩法体系设计与战略分析"
description: "全面调研并设计 minesweeper-rpg 的完整玩法体系，按现状数据、趋势分析、竞争格局、风险机会、行动建议五段式结构输出完整方案"

agents_dir: "agency-agents-zh"

llm:
  provider: claude-code
  max_tokens: 4096
  timeout: 300000
  retry: 2

concurrency: 3

steps:
  - id: market_research
    role: "product/product-trend-researcher"
    name: "游戏市场研究员"
    emoji: "🔍"
    task: |
      全面调研扫雷RPG（Minesweeper RPG）及相关 hybrid 游戏的现状。

      ## 你需要完成的工作：
      1. 调研已有的扫雷RPG游戏（如《Minesweeper RPG》《Minesweeper: The Lost City》《Puzzle Quest》《10000000》《You Must Build a Boat》等 hybrid 游戏）
      2. 分析这些游戏的玩法特点、用户评价、下载量数据
      3. 总结该细分赛道的市场规模和发展现状
      4. 分析核心用户画像和需求（扫雷爱好者 vs RPG爱好者 vs 策略游戏玩家）

      ## 输出要求：
      用中文输出完整的调研报告，包含具体游戏名称、数据对比和关键洞察。字数控制在600字以内。
      输出变量名：market_data

    output: market_data

  - id: trend_analysis
    role: "game-development/game-designer"
    name: "游戏趋势分析师"
    emoji: "📈"
    task: |
      分析扫雷RPG相关的游戏设计趋势。

      ## 你需要完成的工作：
      1. 分析扫雷玩法与RPG机制融合的设计趋势
      2. 研究上下分屏玩法（行动+策略）的设计潮流
      3. 分析 Roguelike、自走棋（Auto Chess）、放置类（Idle）等热门机制与扫雷RPG的结合可能
      4. 分析中国独立游戏市场对创新玩法融合的接受度和成功案例（如《戴森球计划》《暖雪》等创新玩法案例）
      5. 预测该品类未来6-12个月的发展方向

      ## 输出要求：
      用中文输出完整的趋势分析报告，包含具体案例和趋势预测。字数控制在500字以内。
      输出变量名：trend_data

    output: trend_data

  - id: core_mechanic_design
    role: "game-development/game-designer"
    name: "核心玩法设计师"
    emoji: "🎮"
    task: |
      基于市场调研数据 {{market_data}} 和趋势分析 {{trend_data}}，设计 minesweeper-rpg 的核心玩法系统。

      ## 设计约束：
      - 设计原则：上下分屏（上战场下扫雷），扫雷操作产生士兵自动在战场战斗
      - 上屏为战场，我方士兵自动推进战斗
      - 下屏为扫雷区，玩家的扫雷操作直接生成对应的士兵/资源/效果
      - 扫雷的数字提示与士兵种类/数量有直接的映射关系

      ## 你必须详细设计以下内容：

      ### 1. 扫雷与战斗的融合机制
      - 扫雷格子如何映射为士兵/资源/技能（数字1-8与兵种/数量的对应关系）
      - 雷（bomb）的触发效果（负面vs奖励机制，如触发陷阱但奖励稀有材料）
      - 旗帜标记的功能设计（标记后产生增益效果或解锁特殊兵种）
      - 上下屏的实时联动机制（操作反馈到战场的延迟/动画表现）
      - 扫雷区域大小与战场规模的对应关系

      ### 2. 我方英雄种类（至少5种）
      - 列出每种英雄的名称、定位（肉盾/输出/辅助/治疗/控制）、初始技能描述

      ### 3. 我方小兵种类（至少8种）
      - 列出每种小兵的名称、核心属性、特殊能力
      - 小兵的品质体系（与扫雷数字绑定，如翻开数字3出蓝色品质兵）

      ### 4. 闯关类型（至少5种）
      - 列出每种关卡模式的名称、胜利条件、难度曲线特征

      ## 输出要求：
      用中文输出完整的核心机制设计方案，每部分用 ### 标题分段。字数控制在800字以内。每个设计点都要给出具体的数值或名称示例，不要泛泛而谈。
      输出变量名：core_design

    output: core_design
    depends_on: [market_research, trend_analysis]

  - id: rpg_system_design
    role: "game-development/game-designer"
    name: "RPG系统设计师"
    emoji: "⚔️"
    task: |
      基于市场调研数据 {{market_data}} 和趋势分析 {{trend_data}}，设计 minesweeper-rpg 的完整 RPG 系统。

      ## 你必须详细设计以下内容：

      ### 1. 成长线系统
      - 玩家等级体系（等级上限、每级解锁内容）
      - 英雄等级/星级/突破系统（升星材料来源、突破后变化）
      - 小兵升级系统（升级素材、升阶条件）
      - 扫雷操作熟练度系统（鼓励玩家提升扫雷技巧，如连击奖励）

      ### 2. 装备系统
      - 装备槽位设计（武器、防具、饰品、特殊道具共6个槽位）
      - 装备品质体系（白→绿→蓝→紫→金→红，六阶品质）
      - 装备获取途径（扫雷产出、关卡掉落、合成配方）
      - 装备强化/精炼/附魔系统（消耗材料、成功率、保底机制）
      - 装备与扫雷机制的关联（如装备决定扫雷时可用的特殊操作次数）

      ### 3. 技能系统
      - 英雄主动技能设计（每个英雄2-3个技能，列出具体技能名和效果）
      - 被动技能系统（英雄天赋、队伍光环）
      - 技能与扫雷的联动（扫出特定组合触发技能，如同时翻开2个数字5触发AOE）

      ### 4. 怪物类型多样化（至少15种）
      - 按阵营/种族分类（亡灵、机械、野兽、元素、人类、恶魔共6大阵营）
      - 每种怪物列出：名称、阵营、特殊能力、与扫雷难度的对应关系
      - Boss级怪物设计（至少5个Boss，列出名称和核心机制）

      ## 输出要求：
      用中文输出完整的RPG系统设计方案，每部分用 ### 标题分段。字数控制在800字以内。所有设计必须给出具体的名称和数值示例，不可空泛描述。
      输出变量名：rpg_design

    output: rpg_design
    depends_on: [market_research, trend_analysis]

  - id: level_settlement_design
    role: "game-development/game-designer"
    name: "关卡与结算设计师"
    emoji: "🏆"
    task: |
      基于市场调研数据 {{market_data}} 和趋势分析 {{trend_data}}，设计 minesweeper-rpg 的关卡难度体系和结算系统。

      ## 你必须详细设计以下内容：

      ### 1. 扫雷难度与战斗难度的融合变化
      - 扫雷难度如何随关卡推进而变化（雷区从6x6到20x20、雷密度从10%到35%）
      - 特殊地形元素（冻土翻牌减速、熔岩翻牌扣血、迷雾区域需先探路）
      - 难度曲线设计（前15关平滑教学、16-30关引入组合机制、30关后陡峭提升）
      - 动态难度调整机制（战败后下一局雷区缩小或雷数量减少）

      ### 2. 闯关类型详细设计
      - 普通关卡：推进主线剧情，标准扫雷规则
      - Boss关：特殊扫雷规则（如限时翻牌、限定步数）+Boss战
      - 限时挑战：60秒极限扫雷，产出大量资源
      - 生存模式：无限波次，每波扫雷区重置，逐步提升难度
      - 资源副本：矿区（出产强化石）、猎场（出产经验）、遗迹（出产装备碎片）
      - 每日挑战：固定扫雷谜题，全球排行榜

      ### 3. 结算系统
      - 战斗结算流程（胜利/失败判定条件）
      - 扫雷评分系统（步数效率、雷探测率、连击Combo、无伤通关加成）
      - 资源产出公式（与S/A/B/C评分挂钩的倍率）
      - 星级评价系统（1-3星，影响扫荡收益倍率）

      ### 4. 上下分屏的UI布局思路
      - 上屏战场布局（英雄状态栏、小兵队列、敌我进度条）
      - 下屏扫雷区布局（标准扫雷界面+兵种预览栏）
      - 中间过渡区域设计（士兵从下屏翻开的格子走向上屏战场）

      ## 输出要求：
      用中文输出完整的关卡与结算系统设计方案，每部分用 ### 标题分段。字数控制在800字以内。必须给出具体的数值示例和UI布局描述。
      输出变量名：level_design

    output: level_design
    depends_on: [market_research, trend_analysis]

  - id: risk_analysis
    role: "specialized/specialized-risk-assessor"
    name: "风险与机会评估师"
    emoji: "⚖️"
    task: |
      基于核心玩法设计 {{core_design}}、RPG系统设计 {{rpg_design}} 和关卡结算设计 {{level_design}}，全面评估 minesweeper-rpg 项目的风险与机会。

      ## 你需要完成的工作：

      ### 风险分析
      1. 玩法融合风险：扫雷+RPG的结合是否真的有趣？可能的玩法割裂问题及缓解方案
      2. 上手门槛：上下分屏对新手是否友好？是否需要逐步解锁教学
      3. 商业化风险：付费点设计与免费玩家的体验平衡（不卖数值的思路）
      4. 技术风险：实时同步上下屏的性能要求及优化策略
      5. 竞品风险：已有类似游戏或即将上线的竞品应对
      6. 用户规模风险：扫雷爱好者与RPG爱好者的交集是否足够大

      ### 机会分析
      1. 品类创新机会：填补市场空白，成为"扫雷Like"品类开创者
      2. 传播机会：上下分屏的视觉冲击和"扫雷出兵"的爽感适合短视频传播
      3. 国际化机会：扫雷是全球认知度最高的玩法之一，出海门槛低
      4. 长线运营机会：RPG成长线+扫雷随机性提供长期留存基础
      5. UGC潜力：玩家自创扫雷地图/关卡的生态可能性

      ## 输出要求：
      用中文输出完整的风险与机会分析，每部分用 ### 标题分段。字数控制在500字以内。每个风险点必须给出缓解策略，每个机会点必须给出落地思路。
      输出变量名：risk_report

    output: risk_report
    depends_on: [core_mechanic_design, rpg_system_design, level_settlement_design]

  - id: final_report
    role: "specialized/specialized-chief-of-staff"
    name: "首席策略官"
    emoji: "📋"
    task: |
      作为首席策略官，你需要将所有上游分析结果整合为一份完整的 minesweeper-rpg 战略游戏设计方案，严格按以下5段式结构输出。

      ## 上游数据
      - 市场现状：{{market_data}}
      - 趋势分析：{{trend_data}}
      - 核心玩法：{{core_design}}
      - RPG系统：{{rpg_design}}
      - 关卡结算：{{level_design}}
      - 风险机会：{{risk_report}}

      ## 你必须整合上述所有内容，输出以下结构的完整报告（每段都要融合上游数据）：

      # 1. 现状与数据
      整合市场调研中的关键数据和竞品信息，扫雷RPG品类的发展现状，核心用户画像。

      # 2. 趋势分析
      整合趋势分析中的核心洞察，包含具体趋势方向和预测。

      # 3. 竞争格局
      - 基于市场调研和核心设计，分析扫雷RPG的竞争定位
      - 与现有竞品的差异化优势（必须体现核心玩法设计中的英雄、小兵、扫雷融合机制）
      - 目标用户画像和市场切入点

      # 4. 风险与机会
      - 整合风险评估中的核心结论
      - 每条风险必须有对应应对策略

      # 5. 行动建议
      - **MVP阶段**（1-2个月）：核心功能清单（上下分屏、扫雷出兵、3种英雄、5种小兵、10个关卡）
      - **Alpha阶段**（3-4个月）：完整成长线、装备系统、技能系统、20种怪物、5大关卡类型
      - **Beta阶段**（5-6个月）：结算系统、排行榜、每日挑战、商业化系统
      - **上线阶段**（7-8个月）：运营活动规划、UGC地图编辑器、国际化准备
      - 测试策略和用户获取建议

      ## ⚠️ 最终产出要求：
      - 用中文输出，总字数控制在2000字以内
      - 必须是完整的、可直接交付使用的设计方案
      - ⚠️ 只输出最终报告本身：不要开场白、不要复盘或说明、不要向用户提问、不要建议任何命令或后续动作。

    depends_on:
      - market_research
      - trend_analysis
      - core_mechanic_design
      - rpg_system_design
      - level_settlement_design
      - risk_analysis
