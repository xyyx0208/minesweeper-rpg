name: Godot CI
on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check project structure
        run: |
          echo "Checking project structure..."
          test -f project.godot && echo "project.godot exists" || echo "No project.godot yet"
          ls -la
